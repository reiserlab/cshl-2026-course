version: 3

# P3 Heisenberg/Wolf/Dill closed-loop conditioning, short pilot.
#
# Default activation stock: hot cell. P1 and moowalker (and other validated
# activation lines) can be substituted in the run metadata after instructor
# approval. Cue A is always the reinforced cue in this course protocol.
#
# STUDENT PATTERN CHOICE: edit BOTH pattern_name and pattern_id below using the
# table in docs/protocols/p3.md. The name selects the pattern; pattern_id feeds
# the command's pattern_ID global shared-SD fallback. They must remain paired.
#
# Timing: 3 s gray start + 24 x 20 s trials + 1 s shutdown = about 8 min 4 s,
# plus small command overhead. Every trial is a separate 20 s closed-loop
# chunk. Starts alternate frame 25 (cue A in front) and frame 75 (cue B).

experiment_info:
  name: "p3_conditioning_closedloop_short"
  author: "Reiser Lab"
  date_created: 2026-07-10

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

plugins:
  - name: "fictrac"
    type: "class"
    matlab:
      class: "FicTracPlugin"
    config:
      bridge_url: "ws://localhost:8765"
      fictrac_port: 60000
      proto: "udp"
      gain: 1.8
      offset: 0

variables:
  # Edit these two linked values together. Default: classic T figures (ID 36).
  pattern_name: &pattern_name "p3_heisenberg_ts"
  pattern_id: &pattern_id 36
  trial_dur: &trial_dur 20
  start_bg_dur: &start_bg_dur 3
  shutdown_dur: &shutdown_dur 1
  cl_gain: &cl_gain -1.8
  led_percent: &led_percent 15
  led_hysteresis: &led_hysteresis 0
  cue_a_on_ranges: &cue_a_on_ranges
    - [ 0, 49 ]
    - [ 100, 149 ]

experiment:
  - "start_bg"
  - "led_off"
  - name: "baseline"
    trials:
      - "baseline_a"
      - "baseline_b"
    repetitions: 3
    randomize: false
  - "led_off"
  - name: "training"
    trials:
      - "training_a"
      - "training_b"
    repetitions: 6
    randomize: false
  - "led_off"
  - name: "probe"
    trials:
      - "probe_a"
      - "probe_b"
    repetitions: 3
    randomize: false
  - "shutdown"

conditions:
  - name: "start_bg"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
        command_name: "trialParams"
        pattern: "course_bg"
        pattern_ID: 23
        duration: *start_bg_dur
        mode: 2
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "wait"
        duration: *start_bg_dur

  - name: "led_off"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0

  - name: "baseline_a"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 25
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "baseline_b"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 75
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "training_a"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 25
        frame_rate: 0
        gain: 0
        led_activation:
          level: *led_percent
          hysteresis: *led_hysteresis
          on_ranges: *cue_a_on_ranges
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "training_b"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 75
        frame_rate: 0
        gain: 0
        led_activation:
          level: *led_percent
          hysteresis: *led_hysteresis
          on_ranges: *cue_a_on_ranges
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "probe_a"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 25
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "probe_b"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: *pattern_name
        pattern_ID: *pattern_id
        duration: *trial_dur
        mode: 3
        frame_index: 75
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *trial_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "shutdown"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
        command_name: "trialParams"
        pattern: "course_bg"
        pattern_ID: 23
        duration: *shutdown_dur
        mode: 2
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "wait"
        duration: *shutdown_dur
      - type: "controller"
        command_name: "stopDisplay"
      - type: "controller"
        command_name: "allOff"
