version: 3

# ============================================================================
# Optomotor + LED timing test (web runner, open-loop).
#
# A slow optomotor grating for `open_dur` seconds, with the LED (analog-out BNC)
# switched ON only for the LAST `led_on` seconds of each trial. This is the
# canonical "fire a command partway through a trial" pattern: the trial's
# display duration is held by trialParams, and the `wait` commands SEQUENCE the
# LED on/off inside that window. (Contrast the plain direction-test trials,
# where no wait is needed.)
#
# Uses only the on-card g6_2x10 pattern 3 (grating_sine). No FicTrac / bridge
# needed — this is pure open-loop. setAnalogOut is G6-controller-only.
#
# LED electrical note: the rig idles its Analog Out BNC at 5.0 V. Here ON =
# 3000 mV (3.0 V) and OFF = 0 mV (dark). If your LED is wired active-low (bright
# at 5 V, dim at 0 V), swap those two values.
#
# TIMING per trial (default 10 s, LED on for the last 5 s):
#   t=0    trialParams — grating starts, LED off
#   t=5    wait(led_pre=5) elapses → setAnalogOut 3000 (LED ON)
#   t=10   wait(led_on=5) elapses → setAnalogOut 0 (LED OFF), trial ends
#   conditionDuration = max(open_dur, led_pre+led_on) = max(10, 10) = 10 s.
#
# IMPORTANT (YAML can't do arithmetic): led_pre is the LED-OFF lead-in and must
# equal open_dur − led_on. To keep the LED on for the LAST led_on seconds after
# changing open_dur, adjust led_pre to match (e.g. open_dur 15 → led_pre 10).
# ============================================================================

experiment_info:
  name: "Optomotor + LED timing test"
  author: "webDisplayTools"

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

variables:
  open_dur: &open_dur 10 # trial duration (s) — same knob concept as the direction test
  led_pre: &led_pre 5 # LED-OFF lead-in (s) — must equal open_dur − led_on
  led_on: &led_on 5 # LED-ON window (s) — the last led_on seconds of the trial

experiment:
  - name: "optomotor_led"
    trials:
      - "optomotor_led_last5"
    repetitions: 3
  - "shutdown"

conditions:
  # ---- optomotor with LED on for the last led_on seconds ---------------------
  # The waits are LOAD-BEARING here: they place setAnalogOut partway through the
  # trial. (A plain display trial needs no wait — the runner holds it for
  # trialParams.duration on its own.)
  - name: "optomotor_led_last5"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 5 # slow optomotor
        gain: 0
      - type: "wait"
        duration: *led_pre # LED stays OFF for the first (open_dur − led_on) s
      - type: "controller"
        command_name: "setAnalogOut"
        mv: 3000 # LED ON (3.0 V)
      - type: "wait"
        duration: *led_on # hold LED on for the last led_on s
      - type: "controller"
        command_name: "setAnalogOut"
        mv: 0 # LED OFF at trial end

  # ---- shutdown --------------------------------------------------------------
  - name: "shutdown"
    commands:
      - type: "controller"
        command_name: "setAnalogOut"
        mv: 0 # ensure LED off
      - type: "controller"
        command_name: "stopDisplay"
      - type: "controller"
        command_name: "allOff"
