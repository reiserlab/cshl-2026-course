version: 3

# P1 motion loom preview.
#
# Visual-only preview for checking the full dark loom, annulus, and fixed-
# footprint darkening controls before building the final optogenetic protocol.
# The final P1 protocol will use a 0.5 s LED prestim before each trial.

experiment_info:
  name: "P1 motion loom preview"
  author: "Reiser Lab"
  date_created: 2026-07-07

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

variables:
  preview_dur: &preview_dur 7
  preview_rate: &preview_rate 10
  hold_dur: &hold_dur 0.5
  blank_dur: &blank_dur 0.5

experiment:
  - name: "loom_preview"
    trials:
      - "preview_loom_disc_f"
      - "preview_loom_disc_l45"
      - "preview_loom_disc_r45"
      - "preview_loom_disc_l90"
      - "preview_loom_disc_r90"
      - "preview_loom_ann_f"
      - "preview_loom_ann_l45"
      - "preview_loom_ann_r45"
      - "preview_loom_ann_l90"
      - "preview_loom_ann_r90"
      - "preview_loom_dim_f"
      - "preview_loom_dim_l45"
      - "preview_loom_dim_r45"
      - "preview_loom_dim_l90"
      - "preview_loom_dim_r90"
    repetitions: 1
    intertrial: "blank"
  - "shutdown"

conditions:
  - name: "blank"
    commands:
      - type: "controller"
        command_name: "allOff"
      - type: "wait"
        duration: *blank_dur

  - name: "preview_loom_disc_f"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "p1_loom_disc_f"
        pattern_ID: 1
        duration: *preview_dur
        mode: 2
        frame_index: 0
        frame_rate: *preview_rate
        gain: 0
      - type: "wait"
        duration: *preview_dur
      - type: "controller"
        command_name: "trialParams"
        pattern: "p1_loom_disc_f"
        pattern_ID: 1
        duration: *hold_dur
        mode: 2
        frame_index: 69
        frame_rate: 0
        gain: 0
      - type: "wait"
        duration: *hold_dur

  - name: "preview_loom_disc_l45"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "p1_loom_disc_l45"
        pattern_ID: 2
