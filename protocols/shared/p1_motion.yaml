version: 3

# P1 motion experiment.
#
# Every visual trial begins with a 0.5 s optogenetic prestim: LED at 25% while
# the trial pattern is held at frame 0, followed by the motion stimulus.
# Loom files contain 70 motion frames plus 5 duplicate
# final frames to avoid rollover before static hold.
#
# Trial counts:
#   optomotor: 2 spatial periods x 3 speeds x 2 directions x 3 reps = 36
#   looming: 3 classes x 5 positions x 2 speeds x 3 reps = 90
# Approximate runtime: under 7 min before metadata/setup overhead.

experiment_info:
  name: "p1_motion"
  author: "Reiser Lab"
  date_created: 2026-07-07

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

variables:
  opto_percent: &opto_percent 25
  prestim_dur: &prestim_dur 0.5

  start_blank_dur: &start_blank_dur 3

  om_move_dur: &om_move_dur 2
  om_blank_dur: &om_blank_dur 0.5

  # rv40 and rv130 approximations using the first 70 motion frames.
  loom_fast_dur: &loom_fast_dur 0.72
  loom_fast_rate: &loom_fast_rate 97
  loom_slow_dur: &loom_slow_dur 2.33
  loom_slow_rate: &loom_slow_rate 30
  loom_hold_dur: &loom_hold_dur 0.5
  loom_blank_dur: &loom_blank_dur 0.5
  shutdown_dur: &shutdown_dur 1

experiment:
  - "start_blank"
  - name: "optomotor"
    trials:
      - "om_36deg_cw_36dps"
      - "om_36deg_ccw_36dps"
      - "om_36deg_cw_108dps"
      - "om_36deg_ccw_108dps"
      - "om_36deg_cw_324dps"
      - "om_36deg_ccw_324dps"
      - "om_72deg_cw_36dps"
      - "om_72deg_ccw_36dps"
      - "om_72deg_cw_108dps"
      - "om_72deg_ccw_108dps"
      - "om_72deg_cw_324dps"
      - "om_72deg_ccw_324dps"
    repetitions: 3
    randomize: true
  - name: "looming"
    trials:
      - "loom_disc_f_fast"
      - "loom_disc_f_slow"
      - "loom_disc_l45_fast"
      - "loom_disc_l45_slow"
      - "loom_disc_r45_fast"
      - "loom_disc_r45_slow"
      - "loom_disc_l90_fast"
      - "loom_disc_l90_slow"
      - "loom_disc_r90_fast"
      - "loom_disc_r90_slow"
      - "loom_ann_f_fast"
      - "loom_ann_f_slow"
      - "loom_ann_l45_fast"
      - "loom_ann_l45_slow"
      - "loom_ann_r45_fast"
      - "loom_ann_r45_slow"
      - "loom_ann_l90_fast"
      - "loom_ann_l90_slow"
      - "loom_ann_r90_fast"
      - "loom_ann_r90_slow"
      - "loom_dim_f_fast"
      - "loom_dim_f_slow"
      - "loom_dim_l45_fast"
      - "loom_dim_l45_slow"
      - "loom_dim_r45_fast"
      - "loom_dim_r45_slow"
      - "loom_dim_l90_fast"
      - "loom_dim_l90_slow"
      - "loom_dim_r90_fast"
      - "loom_dim_r90_slow"
    repetitions: 3
    randomize: true
  - "shutdown"

conditions:
  - name: "start_blank"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
        command_name: "stopDisplay"
      - type: "controller"
        command_name: "allOff"
      - type: "wait"
        duration: *start_blank_dur

  - name: "om_36deg_cw_36dps"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
        command_name: "trialParams"
        pattern: "p1_grating_36deg"
        pattern_ID: 16
        duration: *prestim_dur
        mode: 2
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "controller"
        command_name: "ledDrive"
        percent: *opto_percent
      - type: "wait"
        duration: *prestim_dur
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
