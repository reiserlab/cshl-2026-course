version: 3

# pattern_ID values target files in the flat patterns/ shared pattern library.

# P2 object experiment, tonic optogenetic version.
#
# Initial blocks have no optogenetic stimulation: a dark vertical stripe is
# closed-loop FicTrac controlled directly in front of the fly for 3 x 20 s, then
# the same open-loop CW/CCW sweep set is run once with LED off. The LED is turned on once and held through matched open-loop sweeps, closed-loop single-stripe tracking, and closed-loop A/B object-choice trials.
#
# Frame 0 of p2_bar is centered at the calibrated front column from P1. The
# moving-bar pattern has 200 frames, one azimuth pixel per frame. Sweeps cover
# +/-90 deg centered on the fly's front: CW starts at -90 deg,
# CCW starts at +90 deg, and both pass through front halfway
# through the trial. Sweep rates use integer frame rates:
#   20 fps = 36 deg/s, 40 fps = 72 deg/s, 80 fps = 144 deg/s.
# Choice patterns are 200-frame panoramas. Frame 0 puts the fly straight ahead
# between the front pair; each combo has B-left and B-right handed versions.
#
# Approximate runtime:
#   start gray 3 s
#   no-opto closed-loop front stripe: 3 x 20 s = 1.0 min
#   no-opto sweeps: 3 speeds x 3 CW/CCW pairs = 0.88 min
#   opto sweeps: matched 3 speeds x 3 CW/CCW pairs = 0.88 min
#   opto closed-loop single stripe: 3 x 20 s = 1.0 min
#   opto A/B choice: 6 combos x 4 x 15 s = 6.0 min
#   tonic opto switch: one LED-on command before opto blocks
#   total about 589.0 s = 9.82 min before small command overhead.

experiment_info:
  name: "p2_object_tonic_full"
  author: "Reiser Lab"
  date_created: 2026-07-08

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

plugins:
  - name: "fictrac"
    type: "class"
    matlab:
      class: "FicTracPlugin"
    config:
      bridge_url: "ws://localhost:8765"
      fictrac_port: 60000
      proto: "udp"
      gain: 1.8
      offset: 0

variables:
  opto_percent: &opto_percent 15
  start_bg_dur: &start_bg_dur 3
  base_fix_dur: &base_fix_dur 20
  sw_36_dur: &sw_36_dur 5
  sw_72_dur: &sw_72_dur 2.5
  sw_144_dur: &sw_144_dur 1.25
  cl_dur: &cl_dur 20
  choice_dur: &choice_dur 15
  shutdown_dur: &shutdown_dur 1
  cl_gain: &cl_gain 1.8

experiment:
  - "start_bg"
  - name: "baseline"
    trials:
      - "base_bar"
    repetitions: 3
    randomize: false
  - name: "baseline_sweeps_36"
    trials:
      - "sw_36_cw"
      - "sw_36_ccw"
    repetitions: 3
    randomize: false
  - name: "baseline_sweeps_72"
    trials:
      - "sw_72_cw"
      - "sw_72_ccw"
    repetitions: 3
    randomize: false
  - name: "baseline_sweeps_144"
    trials:
      - "sw_144_cw"
      - "sw_144_ccw"
    repetitions: 3
    randomize: false
  - "opto_on"
  - name: "opto_sweeps_36"
    trials:
      - "sw_36_cw"
      - "sw_36_ccw"
    repetitions: 3
    randomize: false
  - name: "opto_sweeps_72"
    trials:
      - "sw_72_cw"
      - "sw_72_ccw"
    repetitions: 3
    randomize: false
  - name: "opto_sweeps_144"
    trials:
      - "sw_144_cw"
      - "sw_144_ccw"
    repetitions: 3
    randomize: false
  - name: "opto_single_bar_cl"
    trials:
      - "cl_bar"
    repetitions: 3
    randomize: false
  - name: "choice_small"
    trials:
      - "ab_small_l"
      - "ab_small_r"
    repetitions: 2
    randomize: false
  - name: "choice_bpole"
    trials:
      - "ab_bpole_l"
      - "ab_bpole_r"
    repetitions: 2
    randomize: false
  - name: "choice_bright"
    trials:
      - "ab_bright_l"
      - "ab_bright_r"
    repetitions: 2
    randomize: false
  - name: "choice_dark"
    trials:
      - "ab_dark_l"
      - "ab_dark_r"
    repetitions: 2
    randomize: false
  - name: "choice_edge"
    trials:
      - "ab_edge_l"
      - "ab_edge_r"
    repetitions: 2
    randomize: false
  - name: "choice_peak"
    trials:
      - "ab_peak_l"
      - "ab_peak_r"
    repetitions: 2
    randomize: false
  - "shutdown"

conditions:
  - name: "start_bg"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "controller"
        command_name: "trialParams"
        pattern: "course_bg"
        pattern_ID: 23
        duration: *start_bg_dur
        mode: 2
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "wait"
        duration: *start_bg_dur

  - name: "base_bar"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "p2_bar"
        pattern_ID: 24
        duration: *base_fix_dur
        mode: 3
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *base_fix_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  - name: "opto_on"
    commands:
      - type: "controller"
        command_name: "ledDrive"
        percent: *opto_percent

  - name: "sw_36_cw"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "p2_bar"
        pattern_ID: 24
        duration: *sw_36_dur
