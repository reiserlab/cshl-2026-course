        frame_index: 0
        frame_rate: -160
        gain: 0
      - type: "wait"
        duration: *grating_led_pre
      - type: "controller"
        command_name: "ledDrive"
        percent: *sham_level
      - type: "wait"
        duration: *grating_led_on
      - type: "controller"
        command_name: "ledDrive"
        percent: 0
      - type: "wait"
