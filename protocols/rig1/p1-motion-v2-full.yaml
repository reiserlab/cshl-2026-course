version: 3

# pattern_ID values target files in the flat patterns/ shared pattern library.

# P1 motion experiment, v2.
#
# Every visual trial begins with a 0.5 s optogenetic prestim: LED at 25% while
# the trial pattern is held at frame 0. The LED is then turned off for the
# motion stimulus.
# Trials run in fixed order. Opposite-direction optomotor trials and
# left/right looming trials are paired sequentially; front looms are included
# before the lateral pairs for each class.
# Between trials, the arena displays a static background-gray pattern rather
# than allOff/stopDisplay.
# Loom files contain 70 motion frames plus 5 duplicate
# final frames to avoid rollover before static hold.
# Many-dot control looms use their dot trajectory but end on the same final
# dark loom frame as the matched disc loom.
# Optomotor 0 Hz conditions are static frame-0 presentations; moving
# optomotor conditions are paired cw/ccw at matched temporal frequencies.
#
# Trial counts:
#   optomotor: 2 spatial periods x (1 static + 5 TFs x 2 directions) x 3 reps = 66
#   looming: 3 classes x 5 positions x 2 speeds x 3 reps = 90
# Approximate runtime: about 7.9 min before metadata/setup overhead.

experiment_info:
  name: "p1_motion_v2_full"
  author: "Reiser Lab"
  date_created: 2026-07-07

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

variables:
  opto_percent: 5
  prestim_dur: 0.5

  start_blank_dur: 3

  om_move_dur: 2
  om_bg_dur: 0.5

  # rv40 and rv130 approximations using the first 70 motion frames.
  loom_fast_dur: 0.72
  loom_fast_rate: 97
  loom_slow_dur: 2.33
  loom_slow_rate: 30
  loom_hold_dur: 0.5
  loom_bg_dur: 0.5
  shutdown_dur: 1

experiment:
  - "start_blank"
  - name: "optomotor"
    trials:
      - "om_36deg_static_0hz"
      - "om_36deg_cw_1hz"
      - "om_36deg_ccw_1hz"
      - "om_36deg_cw_2hz"
      - "om_36deg_ccw_2hz"
      - "om_36deg_cw_4hz"
      - "om_36deg_ccw_4hz"
      - "om_36deg_cw_8hz"
      - "om_36deg_ccw_8hz"
      - "om_36deg_cw_16hz"
      - "om_36deg_ccw_16hz"
      - "om_72deg_static_0hz"
      - "om_72deg_cw_1hz"
      - "om_72deg_ccw_1hz"
      - "om_72deg_cw_2hz"
      - "om_72deg_ccw_2hz"
      - "om_72deg_cw_4hz"
      - "om_72deg_ccw_4hz"
      - "om_72deg_cw_8hz"
      - "om_72deg_ccw_8hz"
      - "om_72deg_cw_16hz"
      - "om_72deg_ccw_16hz"
    repetitions: 3
    randomize: false
  - name: "looming"
    trials:
      - "loom_disc_f_fast"
      - "loom_disc_f_slow"
      - "loom_disc_l45_fast"
      - "loom_disc_r45_fast"
      - "loom_disc_l45_slow"
      - "loom_disc_r45_slow"
      - "loom_disc_l90_fast"
      - "loom_disc_r90_fast"
      - "loom_disc_l90_slow"
      - "loom_disc_r90_slow"
      - "loom_ann_f_fast"
      - "loom_ann_f_slow"
      - "loom_ann_l45_fast"
      - "loom_ann_r45_fast"
      - "loom_ann_l45_slow"
      - "loom_ann_r45_slow"
      - "loom_ann_l90_fast"
      - "loom_ann_r90_fast"
      - "loom_ann_l90_slow"
      - "loom_ann_r90_slow"
      - "loom_dots_f_fast"
      - "loom_dots_f_slow"
      - "loom_dots_l45_fast"
      - "loom_dots_r45_fast"
      - "loom_dots_l45_slow"
      - "loom_dots_r45_slow"
      - "loom_dots_l90_fast"
      - "loom_dots_r90_fast"
      - "loom_dots_l90_slow"
      - "loom_dots_r90_slow"
    repetitions: 3
    randomize: false
  - "shutdown"

